# ===========================================================================
# MedicalGraphRAGSystem — 全栈 Docker 编排
# 启动: docker compose up -d
# 首次启动会自动导入图谱数据（约 5-10 分钟），之后秒启
# ===========================================================================

services:

  # =========================================================================
  # Neo4j 图数据库
  # =========================================================================
  neo4j:
    image: docker.m.daocloud.io/library/neo4j:5-community
    container_name: medgraph-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-neo4j}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"   # HTTP 浏览器（调试用）
      - "7687:7687"   # Bolt 协议
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
      - ./backend/data:/import  # 图谱数据挂载
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-neo4j} 'RETURN 1' || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 10s
    networks:
      - medgraph-net

  # =========================================================================
  # 图谱数据初始化（一次性，Neo4j 就绪后自动导入）
  # =========================================================================
  init-kg:
    build:
      context: ./backend
      dockerfile: api/Dockerfile
    container_name: medgraph-init
    command: python scripts/docker-init.py
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4j}
    volumes:
      - ./backend/data:/app/data
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - medgraph-net

  # =========================================================================
  # FastAPI 后端
  # =========================================================================
  server:
    build:
      context: ./backend
      dockerfile: api/Dockerfile
    container_name: medgraph-server
    command: >
      python -m backend.api.app
      --neo4j-uri bolt://neo4j:7687
      --neo4j-password ${NEO4J_PASSWORD:-neo4j}
    env_file:
      - .env
    depends_on:
      init-kg:
        condition: service_completed_successfully
    networks:
      - medgraph-net

  # =========================================================================
  # Nginx + React 前端
  # =========================================================================
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medgraph-web
    ports:
      - "${WEB_PORT:-8000}:80"
    depends_on:
      - server
    networks:
      - medgraph-net

volumes:
  neo4j-data:
  neo4j-logs:

networks:
  medgraph-net:
    driver: bridge
